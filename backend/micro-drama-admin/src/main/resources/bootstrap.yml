# 启动阶段从 Consul KV 拉取配置，与 application*.yml 合并后 Consul 侧优先级更高。
# 管理端路径示例：http://149.248.9.215:8500/ui/dc1/kv/config/micro-drama-admin/data/
# 请在 Consul 中创建键 config/micro-drama-admin/data，值为完整 YAML（与原先 application-local 同级结构即可）。
spring:
  application:
    name: micro-drama-admin
  cloud:
    consul:
      # 可通过环境变量 SPRING_CLOUD_CONSUL_HOST / SPRING_CLOUD_CONSUL_PORT 覆盖（避免与 Maven 资源过滤冲突不写 ${}）
      host: 149.248.9.215
      port: 8500
      # 若 Consul 开启 ACL，请设置环境变量 SPRING_CLOUD_CONSUL_TOKEN（或 spring.cloud.consul.token）
      config:
        enabled: true
        format: YAML
        prefix: config
        data-key: data
        watch:
          enabled: true
        fail-fast: false
      discovery:
        enabled: false
        register: false
