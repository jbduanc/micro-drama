# 启动阶段从 Consul KV 拉取配置，与 application*.yml 合并后 Consul 侧优先级更高。
# Consul 地址（任选其一，优先级从高到低与 Spring Boot 一致）：
#   - 启动参数：--spring.cloud.consul.host= --spring.cloud.consul.port=
#   - 环境变量（推荐线上）：SPRING_CLOUD_CONSUL_HOST、SPRING_CLOUD_CONSUL_PORT
#   - JVM 系统属性：-DCONSUL_HOST= -DCONSUL_PORT=（对应下方占位符默认值）
# bootstrap.yml 已排除 Maven 资源过滤，可使用 ${CONSUL_HOST:...} 占位符。
spring:
  application:
    name: micro-drama-content
  cloud:
    consul:
      host: ${CONSUL_HOST:consul}
      port: ${CONSUL_PORT:8500}
      # 若 Consul 开启 ACL，请设置 SPRING_CLOUD_CONSUL_TOKEN（或 spring.cloud.consul.token）
      config:
        enabled: true
        format: YAML
        prefix: config
        data-key: data
        watch:
          enabled: true
        # 线上建议保持 fail-fast=true；如果你希望 Consul 挂了也能启动，改成 false
        fail-fast: true
      discovery:
        enabled: true
        register: true
        prefer-ip-address: true
        health-check-path: /actuator/health
        health-check-interval: 10s
