spring:
  application:
    name: micro-drama-content
  profiles:
    active: local
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    database: ${REDIS_DATABASE:0}

server:
  port: 0

grpc:
  server:
    port: 9091

# 与 admin 对齐；线上由 Consul 覆盖
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}

jwt:
  secret: ${JWT_SECRET:dev-jwt-secret-change-me}
  access-expire: ${JWT_ACCESS_EXPIRE:7200000}

management:
  health:
    grpc:
      enabled: false
