# 镜像名：registry/backend-<子目录名>、registry/frontend-<子目录名>（子目录 = 工程文件夹名，如 micro-drama-admin）
# Monorepo：按服务拆 job；push 走 paths-filter；手动运行按勾选项
name: 短剧项目 CI/CD (Monorepo Multi-Service)

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      build_admin:
        description: 构建 backend/micro-drama-admin（镜像 backend-micro-drama-admin）
        type: boolean
        default: true
      build_user:
        description: 构建 backend/micro-drama-user（镜像 backend-micro-drama-user）
        type: boolean
        default: true
      build_content:
        description: 构建 backend/micro-drama-content（镜像 backend-micro-drama-content）
        type: boolean
        default: true
      build_playback:
        description: 构建 backend/micro-drama-playback（镜像 backend-micro-drama-playback）
        type: boolean
        default: true
      build_video:
        description: 构建 backend-go/micro-drama-video（镜像 backend-micro-drama-video）
        type: boolean
        default: true
      build_payment:
        description: 构建 backend-go/micro-drama-payment（镜像 backend-micro-drama-payment）
        type: boolean
        default: true
      build_frontend:
        description: 构建 frontend 下工程（镜像 frontend-<项目目录名>）
        type: boolean
        default: true
      image_tag:
        description: 镜像 tag
        type: string
        default: "latest"

env:
  # 这些请配置在 GitHub Repository Variables（Settings → Secrets and variables → Actions → Variables）
  # - NEXUS_DOCKER_HOST: 例如 nexus-docker.144.202.122.212.nip.io
  # - NEXUS_URL: 例如 http://nexus.144.202.122.212.nip.io
  # - DEPLOY_WEBHOOK_URL: 例如 http://deploy.144.202.122.212.nip.io/hooks/deploy
  NEXUS_DOCKER_HOST: ${{ vars.NEXUS_DOCKER_HOST }}
  NEXUS_URL: ${{ vars.NEXUS_URL }}
  DEPLOY_WEBHOOK_URL: ${{ vars.DEPLOY_WEBHOOK_URL }}

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      admin: ${{ steps.filter.outputs.admin }}
      user: ${{ steps.filter.outputs.user }}
      content: ${{ steps.filter.outputs.content }}
      playback: ${{ steps.filter.outputs.playback }}
      video: ${{ steps.filter.outputs.video }}
      payment: ${{ steps.filter.outputs.payment }}
      frontend_admin: ${{ steps.filter.outputs.frontend_admin }}
      frontend_mini: ${{ steps.filter.outputs.frontend_mini }}
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 变更检测（按业务域/服务目录）
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            admin:
              - 'backend/micro-drama-admin/**'
              - 'backend/micro-drama-parent/**'
              - 'backend/micro-drama-common/**'
            user:
              - 'backend/micro-drama-user/**'
              - 'backend/micro-drama-parent/**'
              - 'backend/micro-drama-common/**'
            content:
              - 'backend/micro-drama-content/**'
              - 'backend/micro-drama-parent/**'
              - 'backend/micro-drama-common/**'
            playback:
              - 'backend/micro-drama-playback/**'
              - 'backend/micro-drama-parent/**'
              - 'backend/micro-drama-common/**'
            video:
              - 'backend-go/micro-drama-video/**'
              - 'backend/micro-drama-common/**'
            payment:
              - 'backend-go/micro-drama-payment/**'
            frontend_admin:
              - 'frontend/micro-drama-admin/**'
            frontend_mini:
              - 'frontend/micro-drama-mini-app/**'

  backend-common:
    runs-on: ubuntu-latest
    needs: [changes]
    if: |
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.admin == 'true' ||
      needs.changes.outputs.user == 'true' ||
      needs.changes.outputs.content == 'true' ||
      needs.changes.outputs.playback == 'true'
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 JDK8
        uses: actions/setup-java@v4
        with:
          java-version: "8"
          distribution: "temurin"
          cache: maven

      - name: 生成 Maven 配置（直连中央仓库 + Nexus 仅用于私有 Snapshots）
        run: |
          cat > ~/.m2/settings.xml <<'XML'
          <settings>
            <servers>
              <server>
                <id>maven-releases</id>
                <username>${{ secrets.NEXUS_USERNAME }}</username>
                <password>${{ secrets.NEXUS_PASSWORD }}</password>
              </server>
              <server>
                <id>maven-snapshots</id>
                <username>${{ secrets.NEXUS_USERNAME }}</username>
                <password>${{ secrets.NEXUS_PASSWORD }}</password>
              </server>
            </servers>
            <profiles>
              <profile>
                <id>fast-build</id>
                <repositories>
                  <repository>
                    <id>central</id>
                    <url>https://repo.maven.apache.org/maven2</url>
                    <releases><enabled>true</enabled></releases>
                    <snapshots><enabled>false</enabled></snapshots>
                  </repository>
                  <repository>
                    <id>nexus-snapshots</id>
                    <url>${{ env.NEXUS_URL }}/repository/maven-snapshots/</url>
                    <releases><enabled>false</enabled></releases>
                    <snapshots><enabled>true</enabled></snapshots>
                  </repository>
                </repositories>
              </profile>
            </profiles>
            <activeProfiles>
              <activeProfile>fast-build</activeProfile>
            </activeProfiles>
          </settings>
          XML

      - name: Maven 部署 — parent + common
        run: |
          set -e
          mvn -f backend/micro-drama-parent/pom.xml clean deploy -DskipTests
          mvn -f backend/micro-drama-common/pom.xml clean deploy -DskipTests

  build-admin:
    runs-on: ubuntu-latest
    needs: [changes, backend-common]
    if: |
      (github.event_name == 'workflow_dispatch' && inputs.build_admin == true) ||
      (github.event_name == 'push' && needs.changes.outputs.admin == 'true')
    env:
      IMAGE_NAME: backend-micro-drama-admin
      DEPLOY_SERVICE: backend-admin
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 JDK8
        uses: actions/setup-java@v4
        with:
          java-version: "8"
          distribution: "temurin"
          cache: maven

      - name: 生成 Maven 配置
        run: |
          cat > ~/.m2/settings.xml <<'XML'
          <settings>
            <servers>
              <server>
                <id>maven-releases</id>
                <username>${{ secrets.NEXUS_USERNAME }}</username>
                <password>${{ secrets.NEXUS_PASSWORD }}</password>
              </server>
              <server>
                <id>maven-snapshots</id>
                <username>${{ secrets.NEXUS_USERNAME }}</username>
                <password>${{ secrets.NEXUS_PASSWORD }}</password>
              </server>
            </servers>
          </settings>
          XML

      - name: Maven 部署 — micro-drama-admin
        run: mvn -f backend/micro-drama-admin/pom.xml clean deploy -DskipTests

      - name: 配置 Docker 私服
        run: |
          echo "{\"insecure-registries\": [\"${{ env.NEXUS_DOCKER_HOST }}\"]}" | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker

      - name: 规范化 Docker 仓库地址
        run: |
          set -e
          echo "registry=${{ env.NEXUS_DOCKER_HOST }}" >> "$GITHUB_OUTPUT"

      - name: 登录 Nexus Docker
        uses: docker/login-action@v3
        with:
          registry: ${{ env.NEXUS_DOCKER_HOST }}
          username: ${{ secrets.NEXUS_USERNAME }}
          password: ${{ secrets.NEXUS_PASSWORD }}

      - name: Docker build & push
        run: |
          set -e
          TAG="${{ github.event_name == 'workflow_dispatch' && inputs.image_tag || 'latest' }}"
          REG="${{ env.NEXUS_DOCKER_HOST }}"
          cd backend/micro-drama-admin
          docker build -t "${REG}/${{ env.IMAGE_NAME }}:${TAG}" .
          docker push "${REG}/${{ env.IMAGE_NAME }}:${TAG}"

      - name: Webhook 部署
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          set -e
          curl -s -X POST "${{ env.DEPLOY_WEBHOOK_URL }}" \
               -H "X-Deploy-Token: $DEPLOY_TOKEN" \
               -H "Content-Type: application/json" \
               -d '{"services":"${{ env.DEPLOY_SERVICE }}"}'

  build-user:
    runs-on: ubuntu-latest
    needs: [changes, backend-common]
    if: |
      (github.event_name == 'workflow_dispatch' && inputs.build_user == true) ||
      (github.event_name == 'push' && needs.changes.outputs.user == 'true')
    env:
      IMAGE_NAME: backend-micro-drama-user
      DEPLOY_SERVICE: backend-user
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 JDK8
        uses: actions/setup-java@v4
        with:
          java-version: "8"
          distribution: "temurin"
          cache: maven

      - name: 生成 Maven 配置
        run: |
          cat > ~/.m2/settings.xml <<'XML'
          <settings>
            <servers>
              <server>
                <id>maven-releases</id>
                <username>${{ secrets.NEXUS_USERNAME }}</username>
                <password>${{ secrets.NEXUS_PASSWORD }}</password>
              </server>
              <server>
                <id>maven-snapshots</id>
                <username>${{ secrets.NEXUS_USERNAME }}</username>
                <password>${{ secrets.NEXUS_PASSWORD }}</password>
              </server>
            </servers>
          </settings>
          XML

      - name: Maven 部署 — micro-drama-user
        run: mvn -f backend/micro-drama-user/pom.xml clean deploy -DskipTests

      - name: 配置 Docker 私服
        run: |
          echo "{\"insecure-registries\": [\"${{ env.NEXUS_DOCKER_HOST }}\"]}" | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker

      - name: 规范化 Docker 仓库地址
        run: |
          set -e
          echo "registry=${{ env.NEXUS_DOCKER_HOST }}" >> "$GITHUB_OUTPUT"

      - name: 登录 Nexus Docker
        uses: docker/login-action@v3
        with:
          registry: ${{ env.NEXUS_DOCKER_HOST }}
          username: ${{ secrets.NEXUS_USERNAME }}
          password: ${{ secrets.NEXUS_PASSWORD }}

      - name: Docker build & push
        run: |
          set -e
          TAG="${{ github.event_name == 'workflow_dispatch' && inputs.image_tag || 'latest' }}"
          REG="${{ env.NEXUS_DOCKER_HOST }}"
          cd backend/micro-drama-user
          docker build -t "${REG}/${{ env.IMAGE_NAME }}:${TAG}" .
          docker push "${REG}/${{ env.IMAGE_NAME }}:${TAG}"

      - name: Webhook 部署
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          set -e
          curl -s -X POST "${{ env.DEPLOY_WEBHOOK_URL }}" \
               -H "X-Deploy-Token: $DEPLOY_TOKEN" \
               -H "Content-Type: application/json" \
               -d '{"services":"${{ env.DEPLOY_SERVICE }}"}'

  build-content:
    runs-on: ubuntu-latest
    needs: [changes, backend-common]
    if: |
      (github.event_name == 'workflow_dispatch' && inputs.build_content == true) ||
      (github.event_name == 'push' && needs.changes.outputs.content == 'true')
    env:
      IMAGE_NAME: backend-micro-drama-content
      DEPLOY_SERVICE: backend-content
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 JDK8
        uses: actions/setup-java@v4
        with:
          java-version: "8"
          distribution: "temurin"
          cache: maven

      - name: 生成 Maven 配置
        run: |
          cat > ~/.m2/settings.xml <<'XML'
          <settings>
            <servers>
              <server>
                <id>maven-releases</id>
                <username>${{ secrets.NEXUS_USERNAME }}</username>
                <password>${{ secrets.NEXUS_PASSWORD }}</password>
              </server>
              <server>
                <id>maven-snapshots</id>
                <username>${{ secrets.NEXUS_USERNAME }}</username>
                <password>${{ secrets.NEXUS_PASSWORD }}</password>
              </server>
            </servers>
          </settings>
          XML

      - name: Maven 部署 — micro-drama-content
        run: mvn -f backend/micro-drama-content/pom.xml clean deploy -DskipTests

      - name: 配置 Docker 私服
        run: |
          echo "{\"insecure-registries\": [\"${{ env.NEXUS_DOCKER_HOST }}\"]}" | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker

      - name: 规范化 Docker 仓库地址
        run: |
          set -e
          echo "registry=${{ env.NEXUS_DOCKER_HOST }}" >> "$GITHUB_OUTPUT"

      - name: 登录 Nexus Docker
        uses: docker/login-action@v3
        with:
          registry: ${{ env.NEXUS_DOCKER_HOST }}
          username: ${{ secrets.NEXUS_USERNAME }}
          password: ${{ secrets.NEXUS_PASSWORD }}

      - name: Docker build & push
        run: |
          set -e
          TAG="${{ github.event_name == 'workflow_dispatch' && inputs.image_tag || 'latest' }}"
          REG="${{ env.NEXUS_DOCKER_HOST }}"
          cd backend/micro-drama-content
          docker build -t "${REG}/${{ env.IMAGE_NAME }}:${TAG}" .
          docker push "${REG}/${{ env.IMAGE_NAME }}:${TAG}"

      - name: Webhook 部署
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          set -e
          curl -s -X POST "${{ env.DEPLOY_WEBHOOK_URL }}" \
               -H "X-Deploy-Token: $DEPLOY_TOKEN" \
               -H "Content-Type: application/json" \
               -d '{"services":"${{ env.DEPLOY_SERVICE }}"}'

  build-playback:
    runs-on: ubuntu-latest
    needs: [changes, backend-common]
    if: |
      (github.event_name == 'workflow_dispatch' && inputs.build_playback == true) ||
      (github.event_name == 'push' && needs.changes.outputs.playback == 'true')
    env:
      IMAGE_NAME: backend-micro-drama-playback
      DEPLOY_SERVICE: backend-playback
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 JDK8
        uses: actions/setup-java@v4
        with:
          java-version: "8"
          distribution: "temurin"
          cache: maven

      - name: 生成 Maven 配置
        run: |
          cat > ~/.m2/settings.xml <<'XML'
          <settings>
            <servers>
              <server>
                <id>maven-releases</id>
                <username>${{ secrets.NEXUS_USERNAME }}</username>
                <password>${{ secrets.NEXUS_PASSWORD }}</password>
              </server>
              <server>
                <id>maven-snapshots</id>
                <username>${{ secrets.NEXUS_USERNAME }}</username>
                <password>${{ secrets.NEXUS_PASSWORD }}</password>
              </server>
            </servers>
          </settings>
          XML

      - name: Maven 部署 — micro-drama-playback
        run: mvn -f backend/micro-drama-playback/pom.xml clean deploy -DskipTests

      - name: 配置 Docker 私服
        run: |
          echo "{\"insecure-registries\": [\"${{ env.NEXUS_DOCKER_HOST }}\"]}" | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker

      - name: 规范化 Docker 仓库地址
        run: |
          set -e
          echo "registry=${{ env.NEXUS_DOCKER_HOST }}" >> "$GITHUB_OUTPUT"

      - name: 登录 Nexus Docker
        uses: docker/login-action@v3
        with:
          registry: ${{ env.NEXUS_DOCKER_HOST }}
          username: ${{ secrets.NEXUS_USERNAME }}
          password: ${{ secrets.NEXUS_PASSWORD }}

      - name: Docker build & push
        run: |
          set -e
          TAG="${{ github.event_name == 'workflow_dispatch' && inputs.image_tag || 'latest' }}"
          REG="${{ env.NEXUS_DOCKER_HOST }}"
          cd backend/micro-drama-playback
          docker build -t "${REG}/${{ env.IMAGE_NAME }}:${TAG}" .
          docker push "${REG}/${{ env.IMAGE_NAME }}:${TAG}"

      - name: Webhook 部署
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          set -e
          curl -s -X POST "${{ env.DEPLOY_WEBHOOK_URL }}" \
               -H "X-Deploy-Token: $DEPLOY_TOKEN" \
               -H "Content-Type: application/json" \
               -d '{"services":"${{ env.DEPLOY_SERVICE }}"}'

  build-video:
    runs-on: ubuntu-latest
    needs: [changes]
    if: |
      (github.event_name == 'workflow_dispatch' && inputs.build_video == true) ||
      (github.event_name == 'push' && needs.changes.outputs.video == 'true')
    env:
      IMAGE_NAME: backend-micro-drama-video
      DEPLOY_SERVICE: backend-video
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Go 编译校验
        working-directory: backend-go/micro-drama-video
        run: |
          go mod download
          go build -o /dev/null ./cmd/video-worker

      - name: 配置 Docker 私服
        run: |
          echo "{\"insecure-registries\": [\"${{ env.NEXUS_DOCKER_HOST }}\"]}" | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker

      - name: 规范化 Docker 仓库地址
        run: |
          set -e
          echo "registry=${{ env.NEXUS_DOCKER_HOST }}" >> "$GITHUB_OUTPUT"

      - name: 登录 Nexus Docker
        uses: docker/login-action@v3
        with:
          registry: ${{ env.NEXUS_DOCKER_HOST }}
          username: ${{ secrets.NEXUS_USERNAME }}
          password: ${{ secrets.NEXUS_PASSWORD }}

      - name: Docker build & push
        run: |
          set -e
          TAG="${{ github.event_name == 'workflow_dispatch' && inputs.image_tag || 'latest' }}"
          REG="${{ env.NEXUS_DOCKER_HOST }}"
          cd backend-go/micro-drama-video
          docker build -t "${REG}/${{ env.IMAGE_NAME }}:${TAG}" .
          docker push "${REG}/${{ env.IMAGE_NAME }}:${TAG}"

      - name: Webhook 部署
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          set -e
          curl -s -X POST "${{ env.DEPLOY_WEBHOOK_URL }}" \
               -H "X-Deploy-Token: $DEPLOY_TOKEN" \
               -H "Content-Type: application/json" \
               -d '{"services":"${{ env.DEPLOY_SERVICE }}"}'

  build-payment:
    runs-on: ubuntu-latest
    needs: [changes]
    if: |
      (github.event_name == 'workflow_dispatch' && inputs.build_payment == true) ||
      (github.event_name == 'push' && needs.changes.outputs.payment == 'true')
    env:
      IMAGE_NAME: backend-micro-drama-payment
      DEPLOY_SERVICE: backend-payment
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Go 编译校验
        working-directory: backend-go/micro-drama-payment
        run: |
          go mod download
          go build -o /dev/null ./cmd/payment

      - name: 配置 Docker 私服
        run: |
          echo "{\"insecure-registries\": [\"${{ env.NEXUS_DOCKER_HOST }}\"]}" | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker

      - name: 登录 Nexus Docker
        uses: docker/login-action@v3
        with:
          registry: ${{ env.NEXUS_DOCKER_HOST }}
          username: ${{ secrets.NEXUS_USERNAME }}
          password: ${{ secrets.NEXUS_PASSWORD }}

      - name: Docker build & push
        run: |
          set -e
          TAG="${{ github.event_name == 'workflow_dispatch' && inputs.image_tag || 'latest' }}"
          REG="${{ env.NEXUS_DOCKER_HOST }}"
          cd backend-go/micro-drama-payment
          docker build -t "${REG}/${{ env.IMAGE_NAME }}:${TAG}" .
          docker push "${REG}/${{ env.IMAGE_NAME }}:${TAG}"

      - name: Webhook 部署
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          set -e
          curl -s -X POST "${{ env.DEPLOY_WEBHOOK_URL }}" \
               -H "X-Deploy-Token: $DEPLOY_TOKEN" \
               -H "Content-Type: application/json" \
               -d '{"services":"${{ env.DEPLOY_SERVICE }}"}'

  build-frontend:
    runs-on: ubuntu-latest
    needs: [changes]
    if: |
      (github.event_name == 'workflow_dispatch' && inputs.build_frontend == true) ||
      (github.event_name == 'push' && (needs.changes.outputs.frontend_admin == 'true' || needs.changes.outputs.frontend_mini == 'true'))
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: frontend-admin
            dir: frontend/micro-drama-admin
            deploy_service: frontend-admin
            changed_output: frontend_admin
          - name: frontend-mini
            dir: frontend/micro-drama-mini-app
            deploy_service: frontend-mini
            changed_output: frontend_mini
    env:
      HUSKY: "0"
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 跳过未变更前端工程（push 模式）
        if: |
          github.event_name == 'push' &&
          (matrix.changed_output == 'frontend_admin' && needs.changes.outputs.frontend_admin != 'true' ||
           matrix.changed_output == 'frontend_mini' && needs.changes.outputs.frontend_mini != 'true')
        run: |
          echo "No changes for ${{ matrix.name }}; skipping."
          exit 0

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: 安装 Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 依赖缓存（pnpm store）
        uses: actions/cache@v4
        with:
          path: /home/runner/.local/share/pnpm/store
          key: pnpm-store-${{ hashFiles(format('{0}/pnpm-lock.yaml', matrix.dir)) }}
          restore-keys: |
            pnpm-store-

      - name: 前端编译
        working-directory: ${{ matrix.dir }}
        run: |
          set -e
          test -f package.json || { echo "::error::$PWD 下无 package.json"; ls -la; exit 1; }
          pnpm install --frozen-lockfile
          pnpm run build

      - name: 配置 Docker 私服
        run: |
          echo "{\"insecure-registries\": [\"${{ env.NEXUS_DOCKER_HOST }}\"]}" | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker

      - name: 规范化 Docker 仓库地址
        run: |
          set -e
          echo "Using registry ${{ env.NEXUS_DOCKER_HOST }}"

      - name: 登录 Nexus Docker
        uses: docker/login-action@v3
        with:
          registry: ${{ env.NEXUS_DOCKER_HOST }}
          username: ${{ secrets.NEXUS_USERNAME }}
          password: ${{ secrets.NEXUS_PASSWORD }}

      - name: Docker build & push
        working-directory: ${{ matrix.dir }}
        run: |
          set -e
          TAG="${{ github.event_name == 'workflow_dispatch' && inputs.image_tag || 'latest' }}"
          REG="${{ env.NEXUS_DOCKER_HOST }}"
          IMG="frontend-$(basename "${{ matrix.dir }}")"
          docker build -t "${REG}/${IMG}:${TAG}" .
          docker push "${REG}/${IMG}:${TAG}"

      - name: Webhook 部署
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          set -e
          curl -s -X POST "${{ env.DEPLOY_WEBHOOK_URL }}" \
               -H "X-Deploy-Token: $DEPLOY_TOKEN" \
