# 镜像名：registry/backend-<子目录名>、registry/frontend-<子目录名>（子目录 = 工程文件夹名，如 micro-drama-admin）
# push：前后端按各自路径 diff 独立决策；手动运行：仅构建勾选项
name: 短剧项目 CI/CD (Maven + Nexus + Docker)

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      build_admin:
        description: 构建 backend/micro-drama-admin（镜像 backend-micro-drama-admin）
        type: boolean
        default: true
      build_mini:
        description: 构建 backend/micro-drama-mini-app（镜像 backend-micro-drama-mini-app）
        type: boolean
        default: true
      build_frontend:
        description: 构建 frontend 目录工程（镜像 frontend-<项目目录名>）
        type: boolean
        default: true
      image_tag:
        description: 镜像 tag
        type: string
        default: "latest"

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    env:
      NEXUS_DOCKER_HOST: 66.42.106.178:8083
      FRONTEND_DIR: frontend/micro-drama-admin
      # 与 backend/<目录> 的目录名一致，供 paths 判断
      PROJ_ADMIN: micro-drama-admin
      PROJ_MINI: micro-drama-mini-app
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false

      - name: 解析构建目标（push=分路径 diff；手动=仅勾选）
        id: plan
        run: |
          set -e
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
            A="${{ inputs.build_admin }}"
            M="${{ inputs.build_mini }}"
            F="${{ inputs.build_frontend }}"
            echo "admin=$A" >> "$GITHUB_OUTPUT"
            echo "mini=$M" >> "$GITHUB_OUTPUT"
            echo "frontend=$F" >> "$GITHUB_OUTPUT"
            if [ "$A" = "true" ] && [ "$M" = "true" ]; then echo "mvn_target=all" >> "$GITHUB_OUTPUT"
            elif [ "$A" = "true" ]; then echo "mvn_target=admin" >> "$GITHUB_OUTPUT"
            elif [ "$M" = "true" ]; then echo "mvn_target=mini" >> "$GITHUB_OUTPUT"
            else echo "mvn_target=none" >> "$GITHUB_OUTPUT"
            fi
            exit 0
          fi
          # ——— push：仅当对应目录出现在本次 diff 中才构建该角（不互相牵连） ———
          echo "tag=latest" >> "$GITHUB_OUTPUT"
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"
          A=false; M=false; F=false; MVN=none
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            A=true; M=true; F=true; MVN=all
            echo "admin=$A" >> "$GITHUB_OUTPUT"
            echo "mini=$M" >> "$GITHUB_OUTPUT"
            echo "frontend=$F" >> "$GITHUB_OUTPUT"
            echo "mvn_target=$MVN" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          CHANGED=$(git diff --name-only "$BEFORE" "$AFTER" || true)
          if [ -z "$CHANGED" ]; then
            echo "admin=false" >> "$GITHUB_OUTPUT"
            echo "mini=false" >> "$GITHUB_OUTPUT"
            echo "frontend=false" >> "$GITHUB_OUTPUT"
            echo "mvn_target=none" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          A=false; M=false; F=false; MVN=none
          if echo "$CHANGED" | grep -qE '^backend/micro-drama-(parent|common)/'; then
            A=true; M=true; MVN=all
          fi
          if echo "$CHANGED" | grep -qE "^backend/${{ env.PROJ_ADMIN }}/"; then
            A=true
            if [ "$MVN" = "none" ]; then MVN=admin
            elif [ "$MVN" = "mini" ]; then MVN=all; fi
          fi
          if echo "$CHANGED" | grep -qE "^backend/${{ env.PROJ_MINI }}/"; then
            M=true
            if [ "$MVN" = "none" ]; then MVN=mini
            elif [ "$MVN" = "admin" ]; then MVN=all; fi
          fi
          if echo "$CHANGED" | grep -qE "^${{ env.FRONTEND_DIR }}/"; then
            F=true
          fi
          echo "admin=$A" >> "$GITHUB_OUTPUT"
          echo "mini=$M" >> "$GITHUB_OUTPUT"
          echo "frontend=$F" >> "$GITHUB_OUTPUT"
          echo "mvn_target=$MVN" >> "$GITHUB_OUTPUT"

      - name: 从目录名派生镜像全名
        id: imgnames
        run: |
          F="${{ env.FRONTEND_DIR }}"
          echo "image_admin=backend-$(basename "backend/${{ env.PROJ_ADMIN }}")" >> "$GITHUB_OUTPUT"
          echo "image_mini=backend-$(basename "backend/${{ env.PROJ_MINI }}")" >> "$GITHUB_OUTPUT"
          echo "image_frontend=frontend-$(basename "$F")" >> "$GITHUB_OUTPUT"

      - name: 安装 JDK8
        if: steps.plan.outputs.mvn_target != 'none'
        uses: actions/setup-java@v4
        with:
          java-version: "8"
          distribution: "temurin"
          cache: maven

      - name: 生成 Maven 配置
        if: steps.plan.outputs.mvn_target != 'none'
        uses: whelk-io/maven-settings-xml-action@v19
        with:
          servers: |
            [
              {"id":"maven-releases","username":"${{ secrets.NEXUS_USERNAME }}","password":"${{ secrets.NEXUS_PASSWORD }}"},
              {"id":"maven-snapshots","username":"${{ secrets.NEXUS_USERNAME }}","password":"${{ secrets.NEXUS_PASSWORD }}"}
            ]
          mirrors: |
            [{"id":"nexus-maven","url":"${{ secrets.NEXUS_URL }}/repository/maven-public/","mirrorOf":"central"}]

      - name: Maven 部署 — parent + common（任一角涉及后端）
        if: |
          (steps.plan.outputs.mvn_target == 'all' || steps.plan.outputs.mvn_target == 'admin' || steps.plan.outputs.mvn_target == 'mini')
        run: |
          set -e
          mvn -f backend/micro-drama-parent/pom.xml clean deploy -DskipTests
          mvn -f backend/micro-drama-common/pom.xml clean deploy -DskipTests

      - name: Maven 部署 — micro-drama-admin
        if: |
          (steps.plan.outputs.mvn_target == 'all' || steps.plan.outputs.mvn_target == 'admin')
        run: |
          set -e
          mvn -f backend/micro-drama-admin/pom.xml clean deploy -DskipTests

      - name: Maven 部署 — micro-drama-mini-app
        if: |
          (steps.plan.outputs.mvn_target == 'all' || steps.plan.outputs.mvn_target == 'mini')
        run: |
          set -e
          mvn -f backend/micro-drama-mini-app/pom.xml clean deploy -DskipTests

      - name: 安装 pnpm
        if: steps.plan.outputs.frontend == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: 安装 Node
        if: steps.plan.outputs.frontend == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 依赖缓存（仅加速，与 setup-node 解耦）
        if: steps.plan.outputs.frontend == 'true'
        uses: actions/cache@v4
        with:
          path: /home/runner/.local/share/pnpm/store
          key: pnpm-store-${{ hashFiles('frontend/micro-drama-admin/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-

      - name: 前端编译
        if: steps.plan.outputs.frontend == 'true'
        working-directory: ${{ env.FRONTEND_DIR }}
        env:
          HUSKY: "0"
        run: |
          set -e
          test -f package.json || { echo "::error::$PWD 下无 package.json，请检查 FRONTEND_DIR 或是否已提交前端目录"; ls -la; exit 1; }
          pnpm install --frozen-lockfile
          pnpm run build

      - name: 配置 Docker 私服
        if: |
          (steps.plan.outputs.admin == 'true' || steps.plan.outputs.mini == 'true' || steps.plan.outputs.frontend == 'true')
        run: |
          echo "{\"insecure-registries\": [\"${{ env.NEXUS_DOCKER_HOST }}\"]}" | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker
          cat /etc/docker/daemon.json

      - name: 规范化 Docker 仓库地址
        id: docker_registry
        if: |
          (steps.plan.outputs.admin == 'true' || steps.plan.outputs.mini == 'true' || steps.plan.outputs.frontend == 'true')
        run: |
          set -e
          raw="${{ secrets.NEXUS_DOCKER_URL }}"
          raw="$(printf '%s' "$raw" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          host="${raw#https://}"
          host="${host#http://}"
          host="${host%/}"
          if [ -z "$host" ]; then
            echo "::error::Secret NEXUS_DOCKER_URL 为空。请填写 host:port（与 insecure-registries 一致），不要带 https:// 前缀。"
            exit 1
          fi
          echo "host=$host" >> "$GITHUB_OUTPUT"
          echo "Docker 引用前缀: $host"

      - name: 登录 Nexus Docker
        if: |
          (steps.plan.outputs.admin == 'true' || steps.plan.outputs.mini == 'true' || steps.plan.outputs.frontend == 'true')
        uses: docker/login-action@v3
        with:
          registry: ${{ steps.docker_registry.outputs.host }}
          username: ${{ secrets.NEXUS_USERNAME }}
          password: ${{ secrets.NEXUS_PASSWORD }}

      - name: Docker 推送 — ${{ steps.imgnames.outputs.image_admin }}
        if: steps.plan.outputs.admin == 'true'
        run: |
          set -e
          TAG="${{ steps.plan.outputs.tag }}"
          REG="${{ steps.docker_registry.outputs.host }}"
          IMG="${{ steps.imgnames.outputs.image_admin }}"
          cd backend/micro-drama-admin
          docker build -t "${REG}/${IMG}:${TAG}" .
          docker push "${REG}/${IMG}:${TAG}"

      - name: Docker 推送 — ${{ steps.imgnames.outputs.image_mini }}
        if: steps.plan.outputs.mini == 'true'
        run: |
          set -e
          TAG="${{ steps.plan.outputs.tag }}"
          REG="${{ steps.docker_registry.outputs.host }}"
          IMG="${{ steps.imgnames.outputs.image_mini }}"
          cd backend/micro-drama-mini-app
          docker build -t "${REG}/${IMG}:${TAG}" .
          docker push "${REG}/${IMG}:${TAG}"

      - name: Docker 推送 — ${{ steps.imgnames.outputs.image_frontend }}
        if: steps.plan.outputs.frontend == 'true'
        run: |
          set -e
          TAG="${{ steps.plan.outputs.tag }}"
          REG="${{ steps.docker_registry.outputs.host }}"
          IMG="${{ steps.imgnames.outputs.image_frontend }}"
          cd "${{ env.FRONTEND_DIR }}"
          docker build -t "${REG}/${IMG}:${TAG}" .
          docker push "${REG}/${IMG}:${TAG}"

      # ========== 新增自动部署步骤 ==========
      - name: 自动部署到服务器（仅更新本次构建的服务）
        if: |
          (steps.plan.outputs.admin == 'true' || steps.plan.outputs.mini == 'true' || steps.plan.outputs.frontend == 'true')
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_ADMIN: ${{ steps.plan.outputs.admin }}
          DEPLOY_MINI: ${{ steps.plan.outputs.mini }}
          DEPLOY_FRONTEND: ${{ steps.plan.outputs.frontend }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: DEPLOY_ADMIN,DEPLOY_MINI,DEPLOY_FRONTEND
          script: |
            set -e
            cd ~/services  # 你的 docker-compose-services.yml 所在目录

            # 根据本次构建的服务，拼接需要更新的服务列表
            SERVICES=""
            if [ "$DEPLOY_ADMIN" = "true" ]; then
              SERVICES="$SERVICES backend-admin"
            fi
            if [ "$DEPLOY_MINI" = "true" ]; then
              SERVICES="$SERVICES backend-mini"
            fi
            if [ "$DEPLOY_FRONTEND" = "true" ]; then
              SERVICES="$SERVICES frontend-admin"
            fi

            if [ -z "$SERVICES" ]; then
              echo "没有需要更新的服务，跳过部署。"
              exit 0
            fi

            echo ">> 开始更新服务: $SERVICES"
            docker compose -f docker-compose-services.yml pull $SERVICES
            docker compose -f docker-compose-services.yml up -d --force-recreate --remove-orphans $SERVICES
            echo ">> 部署完成，当前运行容器:"
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"